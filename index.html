<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="image-container">
                <img src="profile pic.jpg" alt="Profile Picture" class="profile-image">
            </div>
            <div class="profile-content">
                <h1 class="student-name">Hirusha Kavinda</h1>
                <p class="student-stream">Information System</p>
                <div class="divider"></div>
                <p class="student-bio">
                    Information Systems student passionate about bridging the gap between business needs and technological solutions. Focused on data-driven decision-making, system analysis, and optimizing digital workflows.
                </p>
                <div class="social-links">
                    <a href="https://github.com/HirushaK-arch" target="_blank" class="social-icon">GitHub</a>
                    <a href="https://www.linkedin.com/in/hirusha-kavinda-hkw2004" target="_blank" class="social-icon">LinkedIn</a>
                    <a href="#" class="social-icon">Portfolio</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
